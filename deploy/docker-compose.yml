# Merged deploy compose — replaces dense-deploy/, graph-deploy/, zoekt-deploy/.
# Invocation:
#   docker compose -f deploy/docker-compose.yml up -d           # all non-indexer services
#   docker compose -f deploy/docker-compose.yml --profile indexer run --rm dense-indexer ...
#   docker compose up -d                                        # via root shim
#
# Project name is pinned to `dify` so direct invocation and the root shim
# resolve to the same network/volume prefix (otherwise direct -f produces a
# `deploy_*` prefix while shim produces `dify_*`).
name: dify

services:
  # ── Zoekt (search index) ─────────────────────────────────────────────
  zoekt-webserver:
    build: ./zoekt
    volumes:
      - ${ZOEKT_INDEX_PATH:-/mnt/code/ACE/.repo/.zoekt}:/data/index:ro
    ports:
      - "${ZOEKT_PORT:-6070}:6070"
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6070/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zoekt-indexserver:
    build: ./zoekt
    entrypoint: ["zoekt-git-index"]
    command: ["-index", "/data/index", "/data/repo/"]
    volumes:
      - ${ZOEKT_REPO_PATH:-/mnt/code/ACE/.repo}:/data/repo:ro
      - zoekt_index:/data/index
    networks:
      - sourcepilot-net
    profiles:
      - tools

  # ── SourcePilot Gateway (HTTP API) ───────────────────────────────────
  sourcepilot-gateway:
    build:
      context: ..
      dockerfile: deploy/gateway/Dockerfile
      args:
        INSTALL_DENSE: "${GATEWAY_INSTALL_DENSE:-false}"
    environment:
      ZOEKT_URL: ${ZOEKT_URL:-http://zoekt-webserver:6070}
      AUDIT_LOG_FILE: /var/log/sourcepilot/audit.log
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      NL_ENABLED: ${NL_ENABLED:-false}
      NL_MODEL: ${NL_MODEL:-}
      NL_API_KEY: ${NL_API_KEY:-}
      NL_API_BASE: ${NL_API_BASE:-}
      DENSE_ENABLED: ${DENSE_ENABLED:-false}
      DENSE_VECTOR_DB_URL: http://milvus:19530
      DENSE_EMBEDDING_URL: http://embedding-server:8080/v1
      DENSE_EMBEDDING_MODEL: ${DENSE_EMBEDDING_MODEL:-unixcoder-base}
      DENSE_EMBEDDING_DIM: ${DENSE_EMBEDDING_DIM:-768}
      DENSE_COLLECTION_NAME: ${DENSE_COLLECTION_NAME:-aosp_code}
      GRAPH_ENABLED: ${GRAPH_ENABLED:-false}
      GRAPH_NEO4J_URI: bolt://neo4j:7687
      GRAPH_NEO4J_USER: ${GRAPH_NEO4J_USER:-neo4j}
      GRAPH_NEO4J_PASSWORD: ${GRAPH_NEO4J_PASSWORD:-sourcepilot}
    volumes:
      - ${SP_COCKPIT_AUDIT_LOG_PATH:-../audit.log}:/var/log/sourcepilot/audit.log
    ports:
      - "${SOURCEPILOT_PORT:-9000}:9000"
    depends_on:
      zoekt-webserver:
        condition: service_healthy
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure:5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── SourcePilot Cockpit ──────────────────────────────────────────────
  sp-cockpit:
    # sp-cockpit source lives at repo root; build context is one level up
    # from this compose file.
    build: ../sp-cockpit
    environment:
      SP_COCKPIT_AUDIT_LOG_PATH: /var/log/sourcepilot/audit.log
      SP_COCKPIT_AUDIT_DB_PATH: /data/audit.db
    volumes:
      - ${SP_COCKPIT_AUDIT_LOG_PATH:-../audit.log}:/var/log/sourcepilot/audit.log:ro
      - ../sp-cockpit/data:/data
    ports:
      - "${SP_COCKPIT_PORT:-9100}:9100"
    depends_on:
      sourcepilot-gateway:
        condition: service_started
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: on-failure:5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MCP Server ──────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ..
      dockerfile: deploy/mcp/Dockerfile
    environment:
      SOURCEPILOT_URL: ${SOURCEPILOT_URL:-http://sourcepilot-gateway:9000}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      - "${MCP_PORT:-8888}:8888"
    depends_on:
      sourcepilot-gateway:
        condition: service_healthy
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure:5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Milvus stack (dense lane) ────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    ports:
      - "${ETCD_PORT:-2379}:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sourcepilot-net

  minio:
    image: minio/minio:RELEASE.2024-09-22T00-33-43Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sourcepilot-net

  milvus:
    image: milvusdb/milvus:v2.4.17
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_HEALTH_PORT:-9091}:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - sourcepilot-net

  embedding-server:
    build:
      context: ./dense/embedding-server
    environment:
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-microsoft/unixcoder-base}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      HOST: "0.0.0.0"
      PORT: "8080"
    ports:
      - "${EMBEDDING_PORT:-9088}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - sourcepilot-net

  dense-indexer:
    build:
      context: ..
      dockerfile: deploy/dense/indexer/Dockerfile
    profiles: ["indexer"]
    restart: "no"
    depends_on:
      milvus:
        condition: service_healthy
      embedding-server:
        condition: service_healthy
    environment:
      DENSE_VECTOR_DB_URL: http://milvus:19530
      DENSE_EMBEDDING_URL: http://embedding-server:8080/v1
      DENSE_EMBEDDING_MODEL: ${DENSE_EMBEDDING_MODEL:-unixcoder-base}
      DENSE_EMBEDDING_DIM: ${DENSE_EMBEDDING_DIM:-768}
      DENSE_COLLECTION_NAME: ${DENSE_COLLECTION_NAME:-aosp_code}
    volumes:
      - ${AOSP_SOURCE_ROOT:-/mnt/code/ACE}:/src:ro
    networks:
      - sourcepilot-net

  # ── Neo4j (graph lane) ───────────────────────────────────────────────
  # Now joins sourcepilot-net (was previously on its own default bridge in
  # graph-deploy/docker-compose.yml). See deploy/README.md ADR #4.
  neo4j:
    image: neo4j:5-community
    container_name: sourcepilot-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/sourcepilot
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "sourcepilot", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - sourcepilot-net

  graph-indexer:
    build:
      context: ..
      dockerfile: deploy/graph/indexer/Dockerfile
    profiles: ["indexer"]
    restart: "no"
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      GRAPH_NEO4J_URI: bolt://neo4j:7687
      GRAPH_NEO4J_USER: ${GRAPH_NEO4J_USER:-neo4j}
      GRAPH_NEO4J_PASSWORD: ${GRAPH_NEO4J_PASSWORD:-sourcepilot}
    volumes:
      - ${AOSP_SOURCE_ROOT:-/mnt/code/ACE}:/src:ro
    networks:
      - sourcepilot-net

# ── Networks ────────────────────────────────────────────────────────────
networks:
  sourcepilot-net:
    name: sourcepilot-net
    driver: bridge

# ── Volumes ─────────────────────────────────────────────────────────────
# Volume names are pinned to their pre-merge identifiers (`dense-deploy_*`
# prefix on Milvus stack) to preserve existing data. They are NOT marked
# `external: true` so a fresh host can still bring the stack up; on a host
# that already has these volumes the explicit `name:` binds to existing data.
# See deploy/README.md ADR #3.
volumes:
  zoekt_index:
  etcd_data:
    name: dense-deploy_etcd_data
  minio_data:
    name: dense-deploy_minio_data
  milvus_data:
    name: dense-deploy_milvus_data
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

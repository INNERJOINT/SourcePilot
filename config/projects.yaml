# AOSP Project Registry
# Copy this file to config/projects.yaml and edit paths.
# Backend scope is parsed by scripts/indexing/project_config.py.

projects:
  - name: ace
    source_root: /mnt/code/ACE
    repo_path: /mnt/code/ACE/.repo
    collection_name: aosp_code_ace

    sparse_index:
      index_dir: /mnt/code/ACE/.repo/.zoekt
      zoekt_url: http://localhost:6070

    dense_index:
      collection_name: aosp_code_ace_dense
      embedding_model: nomic-ai/CodeRankEmbed
      include:
        - frameworks/base

    structural_index:
      include:
        - frameworks/base

  - name: t2
    source_root: /mnt/code/T2
    repo_path: /mnt/code/T2/.repo

    sparse_index:
      index_dir: /mnt/code/T2/.repo/.zoekt
      zoekt_url: http://localhost:6071
      manifest_branch: default
      manifest_file: mtk8788_seewo_t1.xml

    # dense_index:
    #   collection_name: aosp_code_t2_dense_unixcoder
    #   embedding_model: microsoft/unixcoder-base

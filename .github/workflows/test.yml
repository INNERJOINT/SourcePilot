name: Test & Auto-Merge

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      ZOEKT_URL: "http://mock-zoekt:6070"
      NL_ENABLED: "false"
      SOURCEPILOT_URL: "http://mock-sourcepilot:9000"
      MCP_AUTH_TOKEN: "test-token-12345"
      AUDIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r src/requirements.txt
          pip install -r mcp-server/requirements.txt
          pip install pytest pytest-asyncio respx

      - name: Run SourcePilot tests
        run: PYTHONPATH=src pytest tests/unit/sourcepilot/ tests/integration/ tests/e2e/ -v

      - name: Run MCP tests
        run: PYTHONPATH=mcp-server pytest tests/unit/mcp/ -v

  auto-merge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

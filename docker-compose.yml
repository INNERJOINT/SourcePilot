include:
  - path: dense-deploy/docker-compose.yml

services:
  zoekt-webserver:
    build: ./zoekt-deploy
    volumes:
      - ${ZOEKT_INDEX_PATH:-/mnt/code/ACE/.repo/.zoekt}:/data/index:ro
    ports:
      - "${ZOEKT_PORT:-6070}:6070"
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:6070/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  audit-viewer:
    build: ./audit-viewer
    # 与 SourcePilot 共用同一份 audit.log，并把 SQLite 镜像库 bind 到
    # 宿主 ./audit-viewer/data，使容器与原生 scripts/run_audit_viewer.sh
    # 写到同一个 audit.db 路径，避免双轨。
    environment:
      AUDIT_LOG_PATH: /var/log/sourcepilot/audit.log
      AUDIT_DB_PATH: /data/audit.db
    volumes:
      - ${AUDIT_LOG_PATH:-./audit.log}:/var/log/sourcepilot/audit.log:ro
      - ./audit-viewer/data:/data
    ports:
      - "${AUDIT_VIEWER_PORT:-9100}:9100"
    networks:
      - sourcepilot-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9100/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zoekt-indexserver:
    build: ./zoekt-deploy
    entrypoint: ["zoekt-git-index"]
    command: ["-index", "/data/index", "/data/repo/"]
    volumes:
      - ${ZOEKT_REPO_PATH:-/mnt/code/ACE/.repo}:/data/repo:ro
      - zoekt_index:/data/index
    networks:
      - sourcepilot-net
    profiles:
      - tools

networks:
  sourcepilot-net:
    name: sourcepilot-net
    driver: bridge

volumes:
  zoekt_index:
